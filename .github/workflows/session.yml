name: NEXUS Session

on:
  schedule:
    # Every 4 hours, Mon–Fri only
    - cron: '0 2 * * 1-5'   # 02:00 UTC — Asia session
    - cron: '0 6 * * 1-5'   # 06:00 UTC — London open
    - cron: '0 10 * * 1-5'  # 10:00 UTC — London/NY overlap
    - cron: '0 14 * * 1-5'  # 14:00 UTC — NY session
    - cron: '0 18 * * 1-5'  # 18:00 UTC — NY close
    - cron: '0 22 * * 1-5'  # 22:00 UTC — End of day

  # Manual trigger — always runs, no weekday restriction
  workflow_dispatch:

jobs:
  run-session:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # push commits
      issues: write      # open and close self-tasks

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run NEXUS session
        run: |
          # Manual triggers always force-run, scheduled runs respect weekday guard
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — bypassing weekday guard"
            npm run run:session -- --force
          else
            npm run run:session
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit results
        run: |
          git config user.name "NEXUS"
          git config user.email "nexus-bot@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add memory/ journal/ docs/
          git diff --staged --quiet || git commit -m "session: $(date -u +'%Y-%m-%d %H:%M UTC') [${{ github.event_name }}]"
          git push