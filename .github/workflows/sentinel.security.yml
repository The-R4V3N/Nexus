name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets & API Key Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@v3.88.26
        with:
          extra_args: --only-verified --results=verified

  dependency-review:
    name: Dependency Supply Chain Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  claudemd-scan:
    name: CLAUDE.md Injection Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan instruction files for injection vectors
        shell: bash
        run: |
          EXIT_CODE=0
          PATTERNS=(
            'ignore\s+(all\s+)?(previous|prior|above)\s+instructions?'
            'disregard\s+(all\s+)?(previous|prior|above)\s+instructions?'
            'you\s+are\s+now\s+'
            'override\s+(system|instructions?|rules?|prompt)'
            'act\s+as\s+(if\s+you\s+(are|were)\s+)?'
            'pretend\s+(you\s+are|to\s+be)'
            'your\s+(true|real|actual)\s+(purpose|goal|mission|identity)'
            '\[system\]'
            '\[assistant\]'
            '<\|im_start\|>'
            '<\|im_end\|>'
            '###\s*instruction'
            '###\s*system'
            'from\s+now\s+on\s+you\s+(must|should|will|shall)'
            'reveal\s+(your\s+)?(api\s+key|secret|token|password)'
          )

          FILES=$(find . -maxdepth 3 -name "CLAUDE.md" -o -name "AGENTS.md" -o -name ".cursorrules" -o -name ".clinerules" 2>/dev/null)

          if [ -z "$FILES" ]; then
            echo "No instruction files found — skipping"
            exit 0
          fi

          for file in $FILES; do
            echo "Scanning: $file"
            for pattern in "${PATTERNS[@]}"; do
              MATCH=$(grep -inE "$pattern" "$file" || true)
              if [ -n "$MATCH" ]; then
                echo "::error file=$file::Injection pattern detected: $pattern"
                echo "$MATCH"
                EXIT_CODE=1
              fi
            done
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "No injection patterns found"
          fi

          exit $EXIT_CODE
